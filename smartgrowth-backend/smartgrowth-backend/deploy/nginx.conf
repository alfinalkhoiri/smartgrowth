# nginx server block for smartgrowth.f-mc.my.id — single domain serving
# both the built frontend (static files) and the Django API (proxied to
# Gunicorn on 127.0.0.1:8002). Because the frontend uses HashRouter
# (see smartgrowth-pwa src/App.tsx), every client-side route lives under one
# '#' fragment that the browser never sends to the server — so a plain
# static file server for "/" is enough, no SPA try_files fallback required
# for routing (kept below anyway as a harmless safety net).
#
# Matches the layout/conventions of the other apps already on this VPS
# (jaktrafficai, tyreproduction): /var/www/<project>, gunicorn on a private
# 127.0.0.1 port, nginx aliasing straight into the project's own
# staticfiles/dist folders (no separate copy step). Port 8002 chosen because
# 8001 is already taken by tyreproduction's gunicorn.
#
# Django admin is deliberately NOT proxied publicly here (same choice the
# other two apps on this box made) — use an SSH tunnel instead, see
# DEPLOY.md.
#
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/smartgrowth
#          sudo ln -s /etc/nginx/sites-available/smartgrowth /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see DEPLOY.md) — it edits this file to add the TLS
# server block and the :80 -> :443 redirect automatically.

server {
    listen 80;
    server_name smartgrowth.f-mc.my.id;

    client_max_body_size 10M;

    root /var/www/smartgrowth/smartgrowth-pwa/smartgrowth-pwa/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /var/www/smartgrowth/smartgrowth-backend/smartgrowth-backend/staticfiles/;
    }
}
